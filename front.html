<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de produtos</title>
</head>
<body>
    <h1>Produtos</h1>
    <hr>

    <div class="topo-acoes">
        <label for="buscaProduto" class="busca-label">Buscar produto:</label>
        <input
            type="search"
            id="buscaProduto"
            name="buscaProduto"
            placeholder="Digite nome, ID ou fornecedor"
            oninput="filtrarProdutos(this.value)"
        >
    </div>

    <form id="formProduto" action="cad.php" method="POST">
        <div class="form-row">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome">
        </div>

        <div class="form-row">
            <label for="id">ID do produto:</label>
            <input type="text" id="id" name="id">
        </div>

        <div class="form-row">
            <label for="quantidade">Quantidade:</label>
            <input type="text" id="quantidade" name="quantidade">
        </div>

        <div class="form-row">
            <label for="preco">Preço:</label>
            <input type="number" id="preco" name="preco" step="0.01" min="0">
        </div>

        <div class="form-row">
            <label for="fornecedor">Fornecedor:</label>
            <input type="text" id="fornecedor" name="fornecedor">
        </div>

        <button id="botaoInserir" type="submit" value="submit">Inserir</button>
        <p id="mensagemFormulario" class="mensagem-formulario" aria-live="polite"></p>
    </form>

    <table id="minhaTabela" style="display: none;">
        <thead>
            <tr>
                <th>ID Produto</th>
                <th>Nome Produto</th>
                <th>Quantidade</th>
                <th>Preço</th>
                <th>Fornecedor</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>

<script src="prog.js"></script>
</body>
</html>
